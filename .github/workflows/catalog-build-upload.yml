name: Catalog Build & Upload (R2)

# ippoan/cap-catalog#1 #7 R2 配布 — 各 caller repo の catalog-extract artifact を
# 集約 → cap-catalog-build で catalog.sqlite を build → Cloudflare R2 に upload。
#
# R2 配置 (schema_version=1):
#   cap-catalog/v1/latest.sqlite             ← consumer (cap CLI / ci-dashboard) が引く
#   cap-catalog/v1/<build_date>.sqlite       ← 履歴 (rollback 用)
#   cap-catalog/v1/latest.jsonl              ← 非 sqlite consumer 用、aggregate JSONL
#
# Trigger:
#   - workflow_run (= cap-catalog 自身の Catalog Extract が main で success した直後に
#     auto-chain。これにより merge → R2 反映 の lag が ~分単位に縮む)
#   - workflow_dispatch (= 任意タイミングで手動 build)
#   - schedule (毎日 03:00 UTC = 12:00 JST、catch-up / 他 caller repo の extract 取り込み用)
#
# **必須 secret (user 側 setup):**
#   - CAP_CATALOG_R2_TOKEN  — R2:Edit 権限の Cloudflare API token (org-level secret)
#
# Account ID / bucket は public な固定値なので workflow に直書き (= R2 endpoint
# URL 等に既に現れているため secret/var 化する利益が無い)。secret が未設定なら
# Detect step が configured=false を立てて upload step は skip (build only)。

on:
  workflow_run:
    # Catalog Extract (self) が **main で success** した時に auto-chain する。
    # `workflow_run` は default branch 上の workflow からしか起動しないので、
    # PR run では走らない (= staging 漏れ無し)。本 workflow 内の
    # `if: github.event.workflow_run.conclusion == 'success'` で念のため再確認。
    workflows: ['Catalog Extract (self)']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip R2 upload (= build + sanity check のみ)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 3 * * *'  # 12:00 JST

permissions:
  contents: read
  actions: read  # 兄弟 workflow の artifact を download するため

env:
  SCHEMA_VERSION: '1'
  BUCKET: 'cap-catalog'
  # Account ID は public (R2 endpoint URL に現れる) → workflow に直書き。
  CLOUDFLARE_ACCOUNT_ID: '24b45709d060d957340180e995f0d373'

jobs:
  build:
    name: build + upload
    runs-on: ubuntu-latest
    # workflow_run trigger は **conclusion 問わず** 起動するので、ここで
    # success のみに絞る (= 失敗した extract で stale artifact を upload しない)。
    # workflow_dispatch / schedule では `workflow_run` event ではないので
    # `conclusion` が undefined → 評価が true になり通常通り走る。
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cap-catalog-builder
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Build cap-catalog-build (release)
        run: cargo build --release --locked -p cap-catalog-builder

      # 各 caller repo の最新成功 run から `catalog-extract` artifact を pull する。
      # caller リストは ci-dashboard `/ci-matrix?format=json` (Refs ippoan/ci-dashboard#398
      # / #399) から動的に取得し、`cap_catalog_covered=true` の repo を列挙する。
      # = caller 投入 → 自動 builder 取り込み が一気通貫になる (Refs #32)。
      # /ci-matrix fetch 失敗時は cap-catalog 自身だけにフォールバック (= 旧 MVP 挙動)。
      - name: Resolve caller repos
        id: callers
        env:
          CI_MATRIX_URL: 'https://ci-dashboard.ippoan.org/ci-matrix?format=json'
        run: |
          set -euo pipefail
          mkdir -p /tmp/cap-catalog-builder
          REPOS_FILE=/tmp/cap-catalog-builder/repos.txt
          if curl -fsSL --max-time 30 "$CI_MATRIX_URL" \
            | jq -er '.repos[] | select(.cap_catalog_covered) | "\(.owner)/\(.name)"' \
            > "$REPOS_FILE"; then
            n=$(wc -l < "$REPOS_FILE")
            echo "resolved $n caller repos from /ci-matrix?format=json"
            echo "source=ci-matrix" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::failed to fetch $CI_MATRIX_URL — fallback to inline cap-catalog only"
            echo 'ippoan/cap-catalog' > "$REPOS_FILE"
            echo "source=fallback" >> "$GITHUB_OUTPUT"
          fi
          echo "repos_file=$REPOS_FILE" >> "$GITHUB_OUTPUT"
          echo "--- caller repos ---"
          cat "$REPOS_FILE"

      - name: Download catalog-extract artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOS_FILE: ${{ steps.callers.outputs.repos_file }}
        run: |
          set -euo pipefail
          mkdir -p extracts
          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue
            echo "::group::pull from $REPO"
            RUN_ID=$(gh run list \
              --repo "$REPO" \
              --workflow catalog-extract.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -z "$RUN_ID" ]; then
              echo "::warning::no successful run for $REPO catalog-extract.yml on main — skip"
              echo "::endgroup::"
              continue
            fi
            DEST="extracts/$(echo "$REPO" | tr '/' '_')"
            mkdir -p "$DEST"
            gh run download "$RUN_ID" \
              --repo "$REPO" \
              --name catalog-extract \
              --dir "$DEST"
            echo "  artifact lines:"
            wc -l "$DEST"/*.jsonl 2>/dev/null || echo "  (no jsonl)"
            echo "::endgroup::"
          done < "$REPOS_FILE"

      - name: Build catalog.sqlite
        run: |
          set -euo pipefail
          INPUTS=$(find extracts -name '*.jsonl' -size +0c | tr '\n' ' ')
          if [ -z "$INPUTS" ]; then
            echo "::error::no non-empty catalog-extract.jsonl found"
            exit 1
          fi
          BUILD_DATE=$(date -u +%Y%m%d-%H%M%S)
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          # shellcheck disable=SC2086
          ./target/release/cap-catalog-build --out catalog.sqlite $INPUTS

          # 集約 JSONL も emit (非 sqlite consumer 用、optional)
          cat $INPUTS > catalog-extract.jsonl

          ls -lh catalog.sqlite catalog-extract.jsonl

      - name: Verify catalog.sqlite (smoke)
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sqlite3, sys
          conn = sqlite3.connect("catalog.sqlite")
          version = conn.execute("SELECT version FROM schema_version").fetchone()[0]
          n_sym = conn.execute("SELECT COUNT(*) FROM symbols").fetchone()[0]
          n_feat = conn.execute("SELECT COUNT(*) FROM features").fetchone()[0]
          repos = [r[0] for r in conn.execute("SELECT DISTINCT repo FROM symbols ORDER BY repo")]
          print(f"schema_version = {version}")
          print(f"symbols        = {n_sym}")
          print(f"features       = {n_feat}")
          print(f"repos          = {repos}")
          if n_sym == 0:
            print("::error::0 symbols in catalog.sqlite", file=sys.stderr)
            sys.exit(1)
          PY

      - name: Detect R2 secret
        id: r2
        env:
          API_TOKEN: ${{ secrets.CAP_CATALOG_R2_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CAP_CATALOG_R2_TOKEN not set — skipping R2 upload (build artifact のみ作成)"
          fi

      - name: Upload to R2
        if: steps.r2.outputs.configured == 'true' && !inputs.dry_run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CAP_CATALOG_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          BUCKET: ${{ env.BUCKET }}
          SCHEMA_VERSION: ${{ env.SCHEMA_VERSION }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
        run: |
          set -euo pipefail
          npm i -g wrangler@latest --no-audit --no-fund
          PREFIX="v${SCHEMA_VERSION}"
          for upload in \
            "catalog.sqlite ${PREFIX}/latest.sqlite" \
            "catalog.sqlite ${PREFIX}/${BUILD_DATE}.sqlite" \
            "catalog-extract.jsonl ${PREFIX}/latest.jsonl"
          do
            FILE=$(echo "$upload" | cut -d' ' -f1)
            KEY=$(echo "$upload" | cut -d' ' -f2)
            echo "::group::PUT r2://${BUCKET}/${KEY}"
            wrangler r2 object put "${BUCKET}/${KEY}" \
              --file "$FILE" \
              --remote
            echo "::endgroup::"
          done

      - name: Upload build artifacts (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: catalog-build
          path: |
            catalog.sqlite
            catalog-extract.jsonl
          if-no-files-found: error
          retention-days: 14
