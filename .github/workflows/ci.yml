name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  # rustfmt / clippy / cargo test / cargo build --release (+ coverage_100.toml があれば 100% gate)
  # status check 名: ci / rustfmt, ci / clippy, ci / cargo test, ci / cargo build --release
  ci:
    uses: ippoan/ci-workflows/.github/workflows/rust-ci.yml@main
    with:
      binary_name: cap
      shared_key: cap-catalog

  # schema/catalog.sql 単体を SQLite に読ませて FTS5 trigram / porter / trigger
  # 同期 (INSERT/UPDATE/DELETE) を gate。cargo test (rusqlite) より上流での独立 gate。
  schema-smoke:
    name: schema-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 tests/schema_smoke.py
