name: CI

# CI は PR のみで走る。main push の再 CI は同じ commit を 2 度測ることに
# なり (PR 通過 = 既に green) 無駄、かつ main runs の見栄えが汚れる。
# branch protection の required check は PR 上の run で満たされる。
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  # rustfmt / clippy / cargo test / cargo build --release (+ coverage_100.toml があれば 100% gate)
  # status check 名: ci / rustfmt, ci / clippy, ci / cargo test, ci / cargo build --release
  ci:
    uses: ippoan/ci-workflows/.github/workflows/rust-ci.yml@main
    with:
      binary_name: cap
      shared_key: cap-catalog

  # schema/catalog.sql 単体を SQLite に読ませて FTS5 trigram / porter / trigger
  # 同期 (INSERT/UPDATE/DELETE) を gate。cargo test (rusqlite) より上流での独立 gate。
  schema-smoke:
    name: schema-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 tests/schema_smoke.py

  # scripts/extract-rust.py の単体テスト。rustdoc JSON の fixture を作って
  # filter / fq_path / @feature 抽出 / dedupe を gate (rustc nightly 不要)。
  extract-rust-test:
    name: extract-rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 tests/test_extract_rust.py

  # `crates/**/*.rs` の pub item に @feature: doc-comment が付いているかを
  # **loud-fail** で gate する (Refs ippoan/cap-catalog#24 Phase C dogfood)。
  # 欠落は `::error` で GitHub Annotations に出る = PR diff 上で赤い行として
  # 表示される。escape hatch は `pub use` / `pub mod <name>;` / `pub fn main()`
  # の 3 形のみ (= 自身が能力を持たない構造的宣言)。
  features-gate:
    name: features-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gate (loud-fail on missing @feature:)
        run: python3 scripts/check-features-gate.py
      - name: Gate self-test (10 cases)
        run: python3 tests/test_check_features_gate.py

  # CI 完走後に auto-merge を queue (rust-alc-api#427 pattern)。reusable は
  # branch protection の required check を信頼するので caller 側は ci /
  # schema-smoke / extract-rust-test / features-gate の全 success を `needs:` で gate する。
  # 将来 deploy job (R2 upload 等) が増えたら #391 / #405 を踏まえて needs: に
  # 入れること (= cutover cancel 防止)。
  auto-merge:
    name: Auto Merge
    needs: [ci, schema-smoke, extract-rust-test, features-gate]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      needs.ci.result == 'success' &&
      needs.schema-smoke.result == 'success' &&
      needs.extract-rust-test.result == 'success' &&
      needs.features-gate.result == 'success'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
